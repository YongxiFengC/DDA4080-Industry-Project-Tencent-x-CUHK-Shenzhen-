# 模型配置
# 定义要评测的所有模型及其 API 参数
models:
  mimo:
    provider: "openai_compatible"
    text_model: "xiaomi/mimo-v2-omni"
    vision_model: "xiaomi/mimo-v2-omni"
    api_key: "${OPENROUTER_API_KEY}"
    endpoint: "${OPENROUTER_API_ENDPOINT}"
    enabled: true

  gpt54:
    provider: "openai_compatible"
    text_model: "openai/gpt-5.4"
    vision_model: "openai/gpt-5.4"
    api_key: "${OPENROUTER_API_KEY}"
    endpoint: "${OPENROUTER_API_ENDPOINT}"
    enabled: true

  gpt52:
    provider: "openai_compatible"
    text_model: "openai/gpt-5.2"
    vision_model: "openai/gpt-5.2"
    api_key: "${OPENROUTER_API_KEY}"
    endpoint: "${OPENROUTER_API_ENDPOINT}"
    enabled: false  # 地区限制 403

  claude_opus46:
    provider: "openai_compatible"
    text_model: "anthropic/claude-opus-4.6"
    vision_model: "anthropic/claude-opus-4.6"
    api_key: "${OPENROUTER_API_KEY}"
    endpoint: "${OPENROUTER_API_ENDPOINT}"
    enabled: false  # 403 - 余额不足，用 claude_opus45 替代

  claude_opus:
    provider: "openai_compatible"
    text_model: "anthropic/claude-opus-4.5"
    vision_model: "anthropic/claude-opus-4.5"
    api_key: "${OPENROUTER_API_KEY}"
    endpoint: "${OPENROUTER_API_ENDPOINT}"
    enabled: false  # 地区限制 403

  kimi:
    provider: "openai_compatible"
    text_model: "moonshotai/kimi-k2.5"
    vision_model: "moonshotai/kimi-k2.5"
    api_key: "${OPENROUTER_API_KEY}"
    endpoint: "${OPENROUTER_API_ENDPOINT}"
    enabled: true

  grok:
    provider: "openai_compatible"
    text_model: "x-ai/grok-4.20-beta"
    vision_model: "x-ai/grok-4.20-beta"
    api_key: "${OPENROUTER_API_KEY}"
    endpoint: "${OPENROUTER_API_ENDPOINT}"
    enabled: true

  qwen:
    provider: "openai_compatible"
    text_model: "qwen/qwen3.5-122b-a10b"
    vision_model: "qwen/qwen3.5-122b-a10b"
    api_key: "${OPENROUTER_API_KEY}"
    endpoint: "${OPENROUTER_API_ENDPOINT}"
    enabled: true
    
  hunyuan:
    provider: "hunyuan"
    text_model: "hunyuan-vision"
    vision_model: "hunyuan-vision"
    api_key: "${HUNYUAN_API_KEY}"
    endpoint: "https://api.hunyuan.cloud.tencent.com/v1/chat/completions"
    enabled: true

# 评测配置
evaluation:
  photo_weight: 0.3
  story_weight: 0.5
  interview_weight: 0.2
  batch_size: 1
  timeout_seconds: 600
  retries: 2
